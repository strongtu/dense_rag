# Dense RAG Service Configuration
# Copy this file to ~/.dense_rag/config.yaml and modify as needed.

# HTTP server listen address
host: "127.0.0.1"

# HTTP server listen port
port: 8123

# Number of top results to return for each query
topk: 5

# Directories to monitor for file changes (supports ~ for home)
# Array format (recommended):
watch_dirs:
  - "~/Documents"
# For WSL2 users monitoring Windows directories:
#  - "/mnt/c/Users/yourname/Documents"

# Legacy single-directory format is also supported:
# watch_dir: "~/Documents"

# Embedding model name (OpenAI API compatible)
model: "text-embedding-bge-m3"

# Embedding service endpoint (OpenAI API compatible)
model_endpoint: "http://127.0.0.1:11434"
